name: Build Android APK

# Builds a self-contained, installable APK with no EAS / Expo account and no
# external services — just Expo prebuild + Gradle on a GitHub runner.
# Made in Italy.

on:
  push:
    branches: [main, vpn]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      # Android refuses to install an update APK whose versionCode is not higher
      # than the installed one. Tie it to the (monotonic) build number + a base
      # offset (reset-proof headroom) so every published build supersedes the
      # previous — the in-app updater then works.
      - name: Set Android versionCode
        run: |
          node -e "const fs=require('fs');const p='./app.json';const j=require(p);j.expo.android.versionCode=100000+${{ github.run_number }};fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');console.log('versionCode =', j.expo.android.versionCode)"

      # Keep the JS-side APP_VERSION identical to app.json expo.version so the
      # updater's compare can never drift. Dev bumps ONLY app.json expo.version.
      - name: Sync APP_VERSION
        run: |
          node -e "const fs=require('fs');const v=require('./app.json').expo.version;const f='./src/lib/version.ts';let s=fs.readFileSync(f,'utf8');s=s.replace(/export const APP_VERSION = '[^']*';/, \"export const APP_VERSION = '\"+v+\"';\");fs.writeFileSync(f,s);console.log('APP_VERSION =', v)"

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      # Build only the ABIs used by real Android TV / boxes (arm64 + armv7).
      # Dropping x86/x86_64 (emulator-only) roughly halves build time and APK size.
      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --build-cache \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk blackstar-player.apk

      # Manifest used by the in-app auto-updater. Stable URL:
      # https://github.com/<repo>/releases/latest/download/version.json
      - name: Make version.json
        run: |
          VER=$(node -p "require('./app.json').expo.version")
          printf '{"version":"%s","apk":"https://github.com/%s/releases/latest/download/blackstar-player.apk"}\n' \
            "$VER" "${{ github.repository }}" > version.json
          cat version.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackstar-player-apk
          path: blackstar-player.apk
          if-no-files-found: error

      - name: Publish to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          name: Blackstar Player (latest build)
          files: |
            blackstar-player.apk
            version.json
          body: |
            Build automatica dell'APK installabile su box Android / Android TV.
            Aggiornamento automatico in-app dalle Release di questo repo.
            Nessun account, nessun server esterno. Made in Italy 🇮🇹
